name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A64055: ${{ secrets.A64055 }}
          B3B2E8: ${{ secrets.B3B2E8 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A64055', '')
          bm = os.environ.get('B3B2E8', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s
              if gm:
                  s2 = s2.replace('<!-- 5ecd5ff3d96868a607b86c47ab450cd8a8d2ff71 -->', gm)
              if bm:
                  s2 = s2.replace('<!-- 02ef5662d027650ba38ed2dfc089bb51db5148c9 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0 and (gm or bm):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
